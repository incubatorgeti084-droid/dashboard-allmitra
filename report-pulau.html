<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Mitra - Rekapitulasi Wilayah Pulau</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        /* Memastikan saat print manual (Ctrl+P) tombol tidak ikut */
        @media print {
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans" x-data="{ 
    mobileMenu: false,
    search: '',
    pulauData: [
    { nama: 'BALI & NUSA TENGGARA', kornas: 'ALIT, BONGGAS ADHI CHANDRA, FAKHRI MASHAR, FUAD, KADIRIYANTO, OVOY, YOHANAH', kab: { t: 41, c: 39, s: 2, p: '95.12%' }, kec: { t: 485, c: 455, s: 30, p: '93.81%' }, sek: { t: 16426, c: 9393, s: 7033, p: '57.18%' } },
    { nama: 'JAWA', kornas: 'ALIT, BONGGAS ADHI CHANDRA, FAKHRI MASHAR, KADIRIYANTO, OVOY, YOHANAH', kab: { t: 108, c: 106, s: 2, p: '98.15%' }, kec: { t: 1835, c: 1622, s: 213, p: '88.39%' }, sek: { t: 91181, c: 33891, s: 57290, p: '37.17%' } },
    { nama: 'KALIMANTAN', kornas: 'ALIT, BONGGAS ADHI CHANDRA, FAKHRI MASHAR, OVOY, YOHANAH', kab: { t: 56, c: 39, s: 17, p: '69.64%' }, kec: { t: 616, c: 321, s: 295, p: '52.11%' }, sek: { t: 18488, c: 2894, s: 15594, p: '15.65%' } },
    { nama: 'LAINNYA', kornas: 'ALIT, BONGGAS ADHI CHANDRA, FAKHRI MASHAR, OVOY, YOHANAH', kab: { t: 18, c: 17, s: 1, p: '94.44%' }, kec: { t: 167, c: 106, s: 61, p: '63.47%' }, sek: { t: 8372, c: 669, s: 7703, p: '7.99%' } },
    { nama: 'MALUKU & PAPUA', kornas: 'ALIT, BONGGAS ADHI CHANDRA, FAKHRI MASHAR, NURUL HUDA, OVOY, RUSTAN, SIGIT GOZALI, YOHANAH', kab: { t: 63, c: 51, s: 12, p: '80.95%' }, kec: { t: 965, c: 466, s: 499, p: '48.29%' }, sek: { t: 10806, c: 2582, s: 8224, p: '23.89%' } },
    { nama: 'SULAWESI', kornas: 'ALIT, BONGGAS ADHI CHANDRA, FAKHRI MASHAR, NURUL HUDA, OVOY, RUSTAN, YOHANAH', kab: { t: 81, c: 80, s: 1, p: '98.77%' }, kec: { t: 1010, c: 918, s: 92, p: '90.89%' }, sek: { t: 24333, c: 11399, s: 12934, p: '46.85%' } },
    { nama: 'SUMATERA', kornas: 'ALIT, BONGGAS ADHI CHANDRA, FAKHRI MASHAR, FUAD, KADIRIYANTO, NURUL HUDA, OVOY, YOHANAH', kab: { t: 147, c: 123, s: 24, p: '83.67%' }, kec: { t: 1873, c: 1387, s: 486, p: '74.05%' }, sek: { t: 53882, c: 9201, s: 44681, p: '17.08%' } }
    ],
    get filteredData() {
        return this.pulauData.filter(i => i.nama.toLowerCase().includes(this.search.toLowerCase()));
    },
    exportPDF() {
        const element = document.getElementById('report-content');
        const opt = {
            margin: 0.3,
            filename: 'Rekap-Wilayah-Pulau-2026.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true, letterRendering: true },
            jsPDF: { unit: 'in', format: 'a2', orientation: 'landscape' }
        };
        html2pdf().set(opt).from(element).save();
    },
    exportImage() {
        const element = document.getElementById('report-content');
        html2canvas(element, { scale: 2, backgroundColor: '#f8fafc' }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Screenshot-Rekap-Pulau.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    },
    exportCSV() {
        const flatData = this.pulauData.map(i => ({
            Pulau: i.nama,
            Kornas: i.kornas,
            Kab_Target: i.kab.t, Kab_Capaian: i.kab.c, Kab_Persen: i.kab.p,
            Kec_Target: i.kec.t, Kec_Capaian: i.kec.c, Kec_Persen: i.kec.p,
            Sekolah_Target: i.sek.t, Sekolah_Capaian: i.sek.c, Sekolah_Persen: i.sek.p
        }));
        const csv = Papa.unparse(flatData);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'Data-Monitoring-Pulau.csv';
        link.click();
    }
}">

    <nav class="bg-indigo-900 text-white sticky top-0 z-50 shadow-lg border-b border-indigo-700 no-print">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-indigo-500 rounded flex items-center justify-center font-black text-white">M</div>
                <span class="text-xl font-bold tracking-tighter uppercase">Monitoring Mitra</span>
            </div>
            
            <div class="hidden md:flex space-x-1 text-sm font-medium">
                <a href="index.html" class="hover:bg-indigo-800 px-4 py-2 rounded-lg transition">Home</a>
                <a href="report-provinsi.html" class="hover:bg-indigo-800 px-4 py-2 rounded-lg transition">38 Provinsi</a>
                <a href="report-pulau.html" class="bg-indigo-600 px-4 py-2 rounded-lg shadow-inner text-white font-bold">Pulau</a>
                <a href="report-all-kornas.html" class="hover:bg-indigo-800 px-4 py-2 rounded-lg transition">All Kornas</a>
            </div>

            <button @click="mobileMenu = !mobileMenu" class="md:hidden p-2 hover:bg-indigo-800 rounded-lg">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M4 6h16M4 12h16m-7 6h7" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
        </div>

        <div x-show="mobileMenu" x-cloak @click.away="mobileMenu = false" class="md:hidden bg-indigo-800 border-t border-indigo-700 px-2 pt-2 pb-3 space-y-1">
            <a href="index.html" class="block px-3 py-2 rounded-md text-indigo-100 hover:bg-indigo-700">Home</a>
            <a href="report-provinsi.html" class="block px-3 py-2 rounded-md text-indigo-100 hover:bg-indigo-700">38 Provinsi</a>
            <a href="report-pulau.html" class="block px-3 py-2 rounded-md text-white bg-indigo-900">Pulau</a>
            <a href="report-all-kornas.html" class="block px-3 py-2 rounded-md text-indigo-100 hover:bg-indigo-700">All Kornas</a>
        </div>
    </nav>

    <div id="report-content">
        <header class="max-w-7xl mx-auto py-10 px-4">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
                <div>
                    <span class="bg-indigo-100 text-indigo-700 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-widest">Mitra Geti 2026</span>
                    <h1 class="text-4xl font-black text-slate-900 mt-2 uppercase">REKAP WILAYAH PULAU</h1>
                    <p class="text-slate-500 mt-2 flex items-center">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full mr-2 animate-pulse"></span>
                        Sinkronisasi Terakhir: <span class="font-bold ml-1 text-slate-700">Sinkronisasi Terakhir: 25 Maret 2026 Jam 23.30</span>
                    </p>
                    
                    <div class="flex flex-wrap gap-2 mt-6 no-print">
                        <button @click="exportPDF()" class="bg-rose-500 hover:bg-rose-600 text-white text-[10px] font-black px-4 py-2.5 rounded-xl transition flex items-center gap-2 shadow-sm active:scale-95">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a2 2 0 00-.586-1.414l-4-4A2 2 0 0013.414 4H7a2 2 0 00-2 2v13a2 2 0 002 2z"/></svg>
                            EXPORT PDF
                        </button>
                        <button @click="exportImage()" class="bg-emerald-500 hover:bg-emerald-600 text-white text-[10px] font-black px-4 py-2.5 rounded-xl transition flex items-center gap-2 shadow-sm active:scale-95">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                            EXPORT IMAGE
                        </button>
                        <button @click="exportCSV()" class="bg-amber-500 hover:bg-amber-600 text-white text-[10px] font-black px-4 py-2.5 rounded-xl transition flex items-center gap-2 shadow-sm active:scale-95">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                            EXPORT CSV
                        </button>
                    </div>
                </div>

                <div class="relative w-full md:w-72 no-print">
                    <input type="text" x-model="search" placeholder="Cari Pulau..." class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none shadow-sm transition-all">
                    <svg class="w-5 h-5 absolute left-3 top-3.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 pb-24">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <template x-for="(item, index) in filteredData" :key="index">
                    <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 p-8 flex flex-col hover:shadow-xl hover:border-indigo-200 transition-all duration-300 relative">
                        
                        <div class="absolute top-8 right-8 w-8 h-8 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold text-xs" x-text="index + 1"></div>

                        <h3 class="font-black text-2xl text-slate-800 mb-2 pr-10 uppercase" x-text="item.nama"></h3>
                        
                        <div class="flex flex-wrap gap-1.5 mb-8">
                            <template x-for="name in item.kornas.split(',')" :key="name">
                                <span class="bg-rose-50 border border-rose-100 text-rose-800 text-[9px] px-3 py-1 rounded-full font-bold uppercase" x-text="name.trim()"></span>
                            </template>
                        </div>

                        <div class="space-y-8">
                            <div>
                                <div class="flex justify-between items-end mb-2">
                                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Kab/Kota</span>
                                    <span class="text-lg font-black text-indigo-600" x-text="item.kab.p"></span>
                                </div>
                                <div class="bg-slate-100 h-2 rounded-full overflow-hidden mb-2 shadow-inner">
                                    <div class="bg-indigo-500 h-full rounded-full transition-all duration-1000" :style="`width: ${item.kab.p}`"></div>
                                </div>
                                <div class="flex justify-between text-[11px] font-bold text-slate-500 uppercase">
                                    <span x-text="`${item.kab.c} / ${item.kab.t}`"></span>
                                    <span class="text-rose-500" x-text="item.kab.s > 0 ? `(SISA: ${item.kab.s})` : ''"></span>
                                </div>
                            </div>

                            <div>
                                <div class="flex justify-between items-end mb-2">
                                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Kecamatan</span>
                                    <span class="text-lg font-black text-emerald-600" x-text="item.kec.p"></span>
                                </div>
                                <div class="bg-slate-100 h-2 rounded-full overflow-hidden mb-2 shadow-inner">
                                    <div class="bg-emerald-500 h-full rounded-full transition-all duration-1000" :style="`width: ${item.kec.p}`"></div>
                                </div>
                                <div class="flex justify-between text-[11px] font-bold text-slate-500 uppercase">
                                    <span x-text="`${item.kec.c} / ${item.kec.t}`"></span>
                                    <span class="text-rose-500" x-text="item.kec.s > 0 ? `(SISA: ${item.kec.s})` : ''"></span>
                                </div>
                            </div>

                            <div>
                                <div class="flex justify-between items-end mb-2">
                                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider italic">Sekolah</span>
                                    <span class="text-lg font-black text-orange-500" x-text="item.sek.p"></span>
                                </div>
                                <div class="bg-slate-100 h-2 rounded-full overflow-hidden mb-2 shadow-inner">
                                    <div class="bg-orange-500 h-full rounded-full transition-all duration-1000" :style="`width: ${item.sek.p}`"></div>
                                </div>
                                <div class="flex justify-between text-[11px] font-bold text-slate-500 uppercase">
                                    <span x-text="`${item.sek.c} / ${item.sek.t}`"></span>
                                    <span class="text-rose-600 font-extrabold" x-text="item.sek.s > 0 ? `(SISA: ${item.sek.s})` : ''"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </main>
    </div> <footer class="bg-white border-t border-slate-200 py-12 no-print">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">© 2026 - Dashboard Capaian Mitra</p>
        </div>
    </footer>
</body>
</html>
