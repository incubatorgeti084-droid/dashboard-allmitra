<!DOCTYPE html>

</head>

        { nama: 'OVOY', wilayah: '38 Provinsi', k: '122', kT: '514', kS: '392', kP: '23.74%', kc: '2058', kcT: '6846', kcS: '4788', kcP: '30%', s: '12133', sT: '286954', sS: '274821', sP: '5.44%' },
        { nama: 'Yohanah', wilayah: '22 Provinsi', k: '117', kT: '322', kS: '205', kP: '36.34%', kc: '1709', kcT: '4390', kcS: '2681', kcP: '39%', s: '7640', sT: '217420', sS: '209780', sP: '4.63%' },
        { nama: 'Bonggas Adhi Chandra', wilayah: '18 Provinsi', k: '172', kT: '308', kS: '136', kP: '55.84%', kc: '2417', kcT: '4302', kcS: '1885', kcP: '56%', s: '5193', sT: '205058', sS: '199865', sP: '3.32%' },

        { nama: 'Fuad', wilayah: '3 Provinsi', k: '33', kT: '52', kS: '19', kP: '63.46%', kc: '371', kcT: '627', kcS: '256', kcP: '59%', s: '300', sT: '28642', sS: '28342', sP: '1.32%' },

        { nama: 'Fakhri Mashar', wilayah: '38 Provinsi', k: '66', kT: '514', kS: '448', kP: '12.84%', kc: '971', kcT: '6846', kcS: '5875', kcP: '14%', s: '1500', sT: '286954', sS: '285454', sP: '0.67%' }

    <nav class="bg-[#3b348b] text-white sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <span class="text-xl font-bold tracking-wider">MONITORING KORNAS</span>
            <div class="hidden md:flex space-x-4 text-sm font-semibold">
                <a href="index.html" class="px-3 py-2 hover:bg-white/10 rounded transition">HOME</a>
                <a href="report-provinsi.html" class="px-3 py-2 hover:bg-white/10 rounded transition uppercase">38 Provinsi</a>
                <a href="report-pulau.html" class="px-3 py-2 hover:bg-white/10 rounded transition uppercase">Pulau</a>
                <a href="report-all-kornas.html" class="px-3 py-2 bg-indigo-900 rounded transition uppercase">All Kornas</a>
            </div>
        </div>
    </nav>

    <header class="bg-[#3b348b] pt-8 pb-20 px-4">
        <div class="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-3 gap-6">
            <div class="bg-white/10 border border-white/20 p-5 rounded-lg backdrop-blur-sm">
                <p class="text-indigo-100 text-[10px] font-bold uppercase mb-2">Total Kabupaten</p>
                <p class="text-4xl font-black text-white">514</p>
            </div>
            <div class="bg-white/10 border border-white/20 p-5 rounded-lg backdrop-blur-sm">
                <p class="text-indigo-100 text-[10px] font-bold uppercase mb-2">Total Kecamatan</p>
                <p class="text-4xl font-black text-white">6.852</p>
            </div>
            <div class="bg-white/10 border border-white/20 p-5 rounded-lg backdrop-blur-sm">
                <p class="text-indigo-100 text-[10px] font-bold uppercase mb-2">Total Sekolah</p>
                <p class="text-4xl font-black text-white">286.954</p>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 -mt-12 pb-20 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <template x-for="(item, index) in kornasData" :key="index">
            <div class="bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden flex flex-col">
                <div class="p-6">
                    <div class="flex justify-between items-start mb-1">
                        <h3 class="text-2xl font-black text-slate-800 tracking-tight" x-text="item.nama"></h3>
                        <span class="bg-blue-600 text-white text-[10px] font-bold px-2 py-1 rounded" x-text="'#' + (index + 1)"></span>
                    </div>
                    <p class="text-blue-600 text-xs font-bold uppercase mb-8" x-text="item.wilayah"></p>
                    
                    <div class="space-y-6">
                        <div>
                            <div class="flex justify-between items-end mb-1 text-[11px] font-bold">
                                <div class="text-slate-400 uppercase tracking-tighter">Kabupaten</div>
                                <div class="text-blue-600" x-text="item.kP"></div>
                            </div>
                            <div class="flex justify-between mb-1">
                                <span class="text-xs font-black text-slate-800" x-text="item.k + ' / ' + item.kT"></span>
                                <span class="text-[10px] text-red-500 italic font-medium" x-text="'(Sisa: ' + item.kS + ')'"></span>
                            </div>
                            <div class="w-full bg-slate-100 rounded-full h-2">
                                <div class="bg-blue-500 h-full rounded-full" :style="'width: ' + item.kP"></div>
                            </div>
                        </div>

                        <div>
                            <div class="flex justify-between items-end mb-1 text-[11px] font-bold">
                                <div class="text-slate-400 uppercase tracking-tighter">Kecamatan</div>
                                <div class="text-emerald-600" x-text="item.kcP"></div>
                            </div>
                            <div class="flex justify-between mb-1">
                                <span class="text-xs font-black text-slate-800" x-text="item.kc + ' / ' + item.kcT"></span>
                                <span class="text-[10px] text-red-500 italic font-medium" x-text="'(Sisa: ' + item.kcS + ')'"></span>
                            </div>
                            <div class="w-full bg-slate-100 rounded-full h-2">
                                <div class="bg-emerald-500 h-full rounded-full" :style="'width: ' + item.kcP"></div>
                            </div>
                        </div>

                        <div>
                            <div class="flex justify-between items-end mb-1 text-[11px] font-bold">
                                <div class="text-slate-400 uppercase tracking-tighter">Sekolah</div>
                                <div class="text-orange-600" x-text="item.sP"></div>
                            </div>
                            <div class="flex justify-between mb-1">
                                <span class="text-xs font-black text-slate-800" x-text="item.s + ' / ' + item.sT"></span>
                                <span class="text-[10px] text-red-500 italic font-medium" x-text="'(Sisa: ' + item.sS + ')'"></span>
                            </div>
                            <div class="w-full bg-slate-100 rounded-full h-2">
                                <div class="bg-orange-500 h-full rounded-full" :style="'width: ' + item.sP"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mt-auto bg-slate-50 border-t border-slate-100 p-5 rounded-b-xl">
                    <div class="flex flex-col space-y-2">
                        <div class="flex justify-between items-center text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                            <span>Progress Sekolah</span>
                            <span>Persentase</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <div class="flex flex-col">
                                <span class="text-xs text-slate-500 font-medium">Target: <span x-text="item.sT"></span></span>
                                <span class="text-lg font-black text-slate-900" x-text="item.s"></span>
                            </div>
                            <div class="text-right">
                                <span class="text-sm font-black text-orange-600 bg-orange-100 px-3 py-1 rounded-lg shadow-sm" x-text="item.sP"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </main>
</body>
</html>
