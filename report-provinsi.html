        return this.provinsiData.filter(i => i.nama.toLowerCase().includes(this.search.toLowerCase()));
    },
    exportPDF() {
        const element = document.getElementById('report-area');
        const opt = {
            margin: 0.2,
            filename: 'Rekapitulasi-Provinsi-2026.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'in', format: 'a2', orientation: 'landscape' }
        };
        html2pdf().set(opt).from(element).save();
    },
    exportImage() {
        const element = document.getElementById('report-area');
        html2canvas(element, { scale: 2, backgroundColor: '#f8fafc' }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Rekap-Provinsi.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    },
    exportCSV() {
        const cleanData = this.provinsiData.map(item => ({
            'Provinsi': item.nama,
            'Kornas': item.kornas,
            'Kab Capaian': item.kab.c,
            'Kab Target': item.kab.t,
            'Kec Capaian': item.kec.c,
            'Kec Target': item.kec.t,
            'Sekolah Capaian': item.sek.c,
            'Sekolah Target': item.sek.t,
            'Persentase Sekolah': item.sek.p
        }));
        const csv = Papa.unparse(cleanData);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.setAttribute('download', 'Data-Rekap-Provinsi.csv');
        link.click();
    }
